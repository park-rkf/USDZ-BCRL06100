<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-TYPE 퍼걸러 AR</title>
  <style>
    /* 화면 한가운데에 예쁜 버튼 만들기 */
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background-color: #e5e5ea; 
    }
    .ar-button { 
      padding: 20px 40px; 
      font-size: 22px; 
      font-weight: bold; 
      background-color: #007AFF; /* 애플 스타일 파란색 */
      color: white; 
      text-decoration: none; 
      border-radius: 15px; 
      box-shadow: 0 10px 20px rgba(0,122,255,0.3);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- 핵심! rel="ar" 명령어가 아이폰 AR 카메라를 즉시 깨웁니다 -->
  <a rel="ar" href="A-2.usdz" class="ar-button">
    📷 공간에 퍼걸러 배치해보기<br>
    <span style="font-size: 14px; font-weight: normal; margin-top: 5px; display: block;">(아이폰 전용)</span>
  </a>

</body>
</html>
